{% extends "base.html" %}
{% block title %}Games — Admin — ScoutPro{% endblock %}

{% block content %}
<div class="d-flex align-items-center mb-3">
    <a href="{{ url_for('admin.index') }}" class="btn btn-sm btn-outline-primary me-2">
        <i class="bi bi-arrow-left"></i>
    </a>
    <h2 class="fw-bold text-primary mb-0">Games</h2>
</div>

<!-- Existing Games -->
{% for game in games %}
<div class="card mb-3">
    <div class="card-header fw-bold d-flex justify-content-between align-items-center">
        {{ game.name }}
        <span class="badge bg-secondary">ID: {{ game.id }}</span>
    </div>
    <div class="card-body">
        <form action="{{ url_for('admin.update_game', game_id=game.id) }}" method="post">
            <div class="mb-2">
                <label class="form-label small fw-bold">Name</label>
                <input type="text" name="name" class="form-control" value="{{ game.name }}">
            </div>
            <div class="mb-2">
                <label class="form-label small fw-bold">Logo URL</label>
                <input type="text" name="logo" class="form-control" value="{{ game.logo or '' }}" placeholder="Optional">
            </div>
            <div class="mb-2">
                <label class="form-label small fw-bold">Score Config (JSON)</label>
                <textarea name="score_config" class="form-control" rows="3">{{ game.score_config|tojson }}</textarea>
            </div>
            <button type="submit" class="btn btn-sm btn-primary">Save Changes</button>
        </form>
    </div>
</div>
{% endfor %}

<!-- Create New Game -->
<div class="card">
    <div class="card-header fw-bold">Create New Game</div>
    <div class="card-body">
        <form action="{{ url_for('admin.create_game') }}" method="post">
            <div class="mb-2">
                <label class="form-label small fw-bold">Name</label>
                <input type="text" name="name" class="form-control" required>
            </div>
            <div class="mb-2">
                <label class="form-label small fw-bold">Logo URL</label>
                <input type="text" name="logo" class="form-control" placeholder="Optional">
            </div>
            <button type="submit" class="btn btn-success">Create Game</button>
        </form>
    </div>
</div>
{% endblock %}
